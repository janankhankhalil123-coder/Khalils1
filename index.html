<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HAMAD AI OS | Futuristic AI Portfolio</title>

    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='80'%3E🤖%3C/text%3E%3C/svg%3E">

    <meta name="description" content="Hamad Ali futuristic AI portfolio with cybersecurity, AI systems and modern web development.">
    <meta name="theme-color" content="#00ffff">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00ffff;
            --accent: #8b5cf6;
            --pink: #ec4899;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background: #000;
            color: white;
            overflow-x: hidden;
            cursor: none; /* Custom cursor used */
        }

        /* Unified Matrix Background */
        .matrix {
            position: fixed;
            inset: 0;
            z-index: -20;
            opacity: 0.15;
            background-image: 
                linear-gradient(rgba(0,255,255,.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,255,.08) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        #particles-js {
            position: fixed;
            inset: 0;
            z-index: -15;
        }

        .glow { box-shadow: 0 0 40px rgba(0, 255, 255, 0.2); }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .float { animation: float 4s ease-in-out infinite; }

        .typing {
            overflow: hidden;
            white-space: nowrap;
            border-right: 3px solid var(--primary);
            width: 0;
            animation: typing 5s steps(40, end) infinite alternate;
        }
        @keyframes typing { from { width: 0 } to { width: 100% } }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all .8s ease-out;
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Custom Cursor */
        .cursor {
            width: 20px;
            height: 20px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            box-shadow: 0 0 15px var(--primary);
            transition: transform 0.1s ease;
        }

        /* Skill Bars */
        .skill-bar {
            background: rgba(255,255,255,.1);
            border-radius: 10px;
            height: 12px;
            margin: 10px 0;
            overflow: hidden;
        }
        .skill-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent), var(--pink));
            width: 0;
            transition: width 1.5s ease-in-out;
        }

        /* Responsive Fixes */
        @media (max-width: 768px) {
            .typing { white-space: normal; border-right: none; width: auto; animation: none; }
            .cursor { display: none; }
            body { cursor: auto; }
            .text-7xl { font-size: 3.5rem !important; }
        }
    </style>
</head>
<body>

    <div id="loader" style="position:fixed;inset:0;background:black;z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;">
        <h1 style="font-size:2rem;color:cyan;font-weight:900;text-align:center;">INITIALIZING AI SYSTEM...</h1>
        <div style="width: 200px; height: 2px; background: #333; margin-top: 20px;">
            <div id="loader-bar" style="width: 0%; height: 100%; background: cyan; transition: width 0.3s;"></div>
        </div>
    </div>

    <div id="particles-js"></div>
    <div class="matrix"></div>
    <div class="cursor"></div>

    <nav class="fixed top-0 w-full z-50 p-6 flex justify-between items-center backdrop-blur-md">
        <div class="text-cyan-400 font-black text-2xl tracking-tighter">HAMAD.AI</div>
        <div class="hidden md:flex gap-8 text-sm font-semibold tracking-widest uppercase">
            <a href="#home" class="hover:text-cyan-400 transition">Terminal</a>
            <a href="#projects" class="hover:text-cyan-400 transition">Projects</a>
            <a href="#contact" class="hover:text-cyan-400 transition">Link-up</a>
        </div>
    </nav>

    <section id="home" class="min-h-screen flex items-center justify-center pt-20 px-4">
        <div class="max-w-6xl w-full grid md:grid-cols-2 gap-12 items-center">
            <div class="reveal">
                <h2 class="text-cyan-500 font-bold mb-2 tracking-widest">SYSTEM STATUS: ONLINE</h2>
                <h1 class="text-6xl md:text-8xl font-black mb-6 leading-none">
                    CRAFTING <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">INTELLIGENCE.</span>
                </h1>
                <div class="h-8 mb-8">
                    <p class="typing text-xl text-gray-400">Full-Stack AI Developer & Cyber Architect</p>
                </div>
                <button class="px-8 py-4 bg-cyan-500 text-black font-bold rounded-full glow hover:scale-105 transition">DOWNLOAD PROTOCOL (CV)</button>
            </div>
            
            <div class="relative reveal flex justify-center">
                <div class="w-80 h-80 bg-gradient-to-br from-cyan-500/20 to-purple-500/20 rounded-full flex items-center justify-center border border-white/10 float">
                    <div class="w-72 h-72 rounded-full bg-gray-900 border-2 border-cyan-400/50 flex items-center justify-center overflow-hidden">
                        <span class="text-cyan-400 opacity-50">IMAGE_PLACEHOLDER</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
        // Loader Simulation
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            const bar = document.getElementById('loader-bar');
            bar.style.width = '100%';
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 1000);
        });

        // Custom Cursor Logic
        const cursor = document.querySelector('.cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Scroll Reveal
        const observerOptions = { threshold: 0.1 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, observerOptions);

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        // Particles Config
        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#00ffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.2 },
                "size": { "value": 3 },
                "line_linked": { "enable": true, "distance": 150, "color": "#00ffff", "opacity": 0.1, "width": 1 },
                "move": { "enable": true, "speed": 2 }
            }
        });
    </script>
</body>
</html>
